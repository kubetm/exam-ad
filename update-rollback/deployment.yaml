apiVersion: apps/v1
kind: Deployment
metadata:
  name: web1
  namespace: nginx
spec:
  replicas: 4
  selector:
    matchLabels:
      app: web1
  template:
    metadata:
      labels:
        app: web1
    spec:
      containers:
        - name: nginx
          image: nginx:1.13.7
          ports:
            - containerPort: 80