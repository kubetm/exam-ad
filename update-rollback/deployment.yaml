apiVersion: apps/v1
kind: Deployment
metadata:
  name: web1
  namespace: app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: web1
  template:
    metadata:
      labels:
        app: web1
    spec:
      containers:
        - name: web1-container
          image: 1pro/nginx:1.13.7
          ports:
            - containerPort: 80