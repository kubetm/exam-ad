apiVersion: apps/v1
kind: Deployment
metadata:
  name: hotfix-deployment
  namespace: quetzal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hotfix
  template:
    metadata:
      labels:
        app: hotfix
    spec:
      #securityContext:
        #runAsUser: 30000
      containers:
        - name: hotfix-container
          image: nginxinc/nginx-unprivileged
          ports:
            - containerPort: 8080
          #securityContext:
            #allowPrivilegeEscalation: false