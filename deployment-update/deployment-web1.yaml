apiVersion: apps/v1
kind: Deployment
metadata:
  name: web1
  namespace: nov2026
spec:
  replicas: 3
  selector:
    matchLabels:
      app: web1
  template:
    metadata:
      labels:
        app: web1
    spec:
      containers:
        - name: web1-container
          image: nginx:1.12
          ports:
            - containerPort: 8080